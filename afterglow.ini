# ──────────────────────────────────────────────────────────────────────
#  CLASS_SYMT — Afterglow dark energy example .ini
#
#  Phase 0 scaffold. With afterglow_on = 0 (default), the run is
#  bit-identical to vanilla CLASS LCDM. Flip afterglow_on = 1 once
#  Phase 1 lands on branch feature/afterglow-background.
# ──────────────────────────────────────────────────────────────────────

# Standard LCDM parameters
h            = 0.6732
omega_b      = 0.02238
omega_cdm    = 0.1201
A_s          = 2.100e-9
n_s          = 0.9660
tau_reio     = 0.0543

# Afterglow parameters (Martin & Koh 2026)
afterglow_on      = 0
Omega_dr_dark     = 0.0
z_conf            = 1.0e5
c_D               = 1.0
beta_aft          = 2.5
Sigma_today       = -1        # -1 = auto: Sigma_0 = rho_X_0 / (3 c_D)
cs2_X             = 1.0

# Output
output        = tCl,pCl,lCl,mPk
lensing       = yes
root          = output/afterglow_
write_parameters = yes
