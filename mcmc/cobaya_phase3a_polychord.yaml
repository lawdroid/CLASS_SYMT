# ==============================================================
# Afterglow 3a (beta=0) — PolyChord nested sampling for absolute log Z.
# IDENTICAL theory/likelihood/priors to cobaya_phase3a_baseline.yaml;
# only the sampler is swapped (mcmc -> polychord) so the evidence is
# computed on the same footing as cobaya_lcdm_polychord.yaml.
# Pairs with launch_evidence_run.sh for Delta log Z (3a - LCDM).
# ==============================================================

theory:
  afterglow_theory.AfterglowTheory:
    python_path: ./
    extra_args:
      output: "tCl,pCl,lCl,mPk"
      l_max_scalars: 2508
      lensing: "yes"
      non_linear: "halofit"
      afterglow_on: "yes"
      afterglow_beta: 0.0
      cs2_X: 0.5
      afterglow_shoot_eps_Sigma: "yes"
      tol_background_integration: 1.0e-5
      tol_perturbations_integration: 1.0e-5

likelihood:
  planck_NPIPE_highl_CamSpec.TTTEEE:
    path: ./data/Planck_NPIPE
  planck_NPIPE_lowl_TT:
    path: ./data/Planck_NPIPE
  planck_NPIPE_lowl_EE:
    path: ./data/Planck_NPIPE
  planck_2018_lensing.clik:
    path: ./data/Planck_NPIPE
  bao.desi_dr2:
    path: ./data/DESI_DR2
  sn.pantheonplus:
    path: ./data/Pantheon+
    use_abs_mag: False

params:
  H0:
    prior: {min: 55.0, max: 85.0}
    ref:   {dist: norm, loc: 67.4, scale: 1.0}
    proposal: 0.5
    latex: H_0
  omega_b:
    prior: {min: 0.019, max: 0.025}
    ref:   {dist: norm, loc: 0.02237, scale: 0.0002}
    proposal: 0.0001
    latex: \Omega_\mathrm{b} h^2
  omega_cdm:
    prior: {min: 0.10, max: 0.15}
    ref:   {dist: norm, loc: 0.1200, scale: 0.001}
    proposal: 0.0005
    latex: \Omega_\mathrm{cdm} h^2
  tau_reio:
    prior: {min: 0.01, max: 0.10}
    ref:   {dist: norm, loc: 0.0543, scale: 0.008}
    proposal: 0.005
    latex: \tau_\mathrm{reio}
  ln10As:
    prior: {min: 2.5, max: 3.5}
    ref:   {dist: norm, loc: 3.044, scale: 0.014}
    proposal: 0.005
    latex: \ln 10^{10} A_\mathrm{s}
  n_s:
    prior: {min: 0.92, max: 1.00}
    ref:   {dist: norm, loc: 0.965, scale: 0.004}
    proposal: 0.003
    latex: n_\mathrm{s}
  log10_c_D:
    prior: {min: 0.7, max: 2.0}
    ref:   {dist: norm, loc: 1.0, scale: 0.2}
    proposal: 0.1
    latex: \log_{10} c_D
  c_D:
    derived: "lambda log10_c_D: 10 ** log10_c_D"
    latex: c_D
  late_branch_guard:
    derived: "lambda c_D: c_D - 1.0/3.0"
    prior: {min: 0.0, max: 1.0e10}
    drop: True
  w_X:
    derived: "lambda c_D: -1.0 + 1.0 / (3.0 * c_D)"
    latex: w_X
  Omega_m:
    latex: \Omega_\mathrm{m}
  sigma8:
    latex: \sigma_8

sampler:
  polychord:
    precision_criterion: 0.001
    nlive: 500
    num_repeats: 63                    # ~3*nDim (one extra dim vs LCDM)
    do_clustering: True
    read_resume: True

output: chains/evidence_3a/afterglow_3a_ns
resume: True
force: False
debug: False
packages_path: ./cobaya_packages
